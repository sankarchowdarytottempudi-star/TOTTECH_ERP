services:
  postgres:
    image: postgres:16
    container_name: tottech_one_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tottech_one}
      POSTGRES_USER: ${POSTGRES_USER:-tottech_one}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - tottech_one_pgdata:/var/lib/postgresql/data
      - ./docker/init/000-create-compat-role.sql:/docker-entrypoint-initdb.d/000-create-compat-role.sql:ro
      - ./schoolerp_before_demo_seed.sql:/docker-entrypoint-initdb.d/001-recovered.sql:ro
      - ./prisma/migrations/202606051535_enterprise_reconstruction/migration.sql:/docker-entrypoint-initdb.d/010-enterprise.sql:ro
      - ./prisma/migrations/202606051610_ai_governance_completion/migration.sql:/docker-entrypoint-initdb.d/020-ai-governance.sql:ro
      - ./prisma/migrations/202606051625_academic_year_guard/migration.sql:/docker-entrypoint-initdb.d/030-academic-year-guard.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tottech_one} -d ${POSTGRES_DB:-tottech_one}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: node:22-bookworm-slim
    container_name: tottech_one_web
    restart: unless-stopped
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-tottech_one}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-tottech_one}?schema=public
      NEXT_PUBLIC_APP_NAME: TOTTECH ONE
      TOTTECH_AI_BRAND: TOTTECH AI
      TOTTECH_ONE_BRAND: TOTTECH ONE
    volumes:
      - ./:/app
      - tottech_one_uploads:/app/uploads
      - tottech_one_documents:/app/public/uploads
    command: sh -c "apt-get update && apt-get install -y openssl && npm ci && npx prisma generate && npm run build && npm run start"
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  tottech_one_pgdata:
  tottech_one_uploads:
  tottech_one_documents:
