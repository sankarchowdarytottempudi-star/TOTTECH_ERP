name: tottech-clinical-services

services:
  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/clinical-production/Dockerfile.clinical
    image: tottech/clinical-services:production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: clinical-documents
    secrets:
      - database_url
      - jwt_secret
      - session_secret
      - rabbitmq_password
      - minio_root_user
      - minio_root_password
    command:
      - sh
      - -c
      - |
        export DATABASE_URL="$(cat /run/secrets/database_url)"
        export JWT_SECRET="$(cat /run/secrets/jwt_secret)"
        export SESSION_SECRET="$(cat /run/secrets/session_secret)"
        export RABBITMQ_URL="amqp://clinical:$(cat /run/secrets/rabbitmq_password)@rabbitmq:5672"
        export S3_ACCESS_KEY="$(cat /run/secrets/minio_root_user)"
        export S3_SECRET_KEY="$(cat /run/secrets/minio_root_password)"
        npm run start -- -p 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-schoolerp}
      POSTGRES_USER: ${POSTGRES_USER:-schooladmin}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-schooladmin} -d ${POSTGRES_DB:-schoolerp}
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-bookworm
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: clinical
    secrets:
      - rabbitmq_password
    command:
      - sh
      - -c
      - |
        export RABBITMQ_DEFAULT_PASS="$(cat /run/secrets/rabbitmq_password)"
        rabbitmq-server
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets:
      - minio_root_user
      - minio_root_password
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
    secrets:
      - grafana_admin_password
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  prometheus-data:
  grafana-data:

secrets:
  database_url:
    external: true
  jwt_secret:
    external: true
  session_secret:
    external: true
  postgres_password:
    external: true
  rabbitmq_password:
    external: true
  minio_root_user:
    external: true
  minio_root_password:
    external: true
  grafana_admin_password:
    external: true
