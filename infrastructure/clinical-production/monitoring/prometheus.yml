global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: tottech-clinical-frontend
    metrics_path: /api/operations/health
    static_configs:
      - targets:
          - frontend:3000

  - job_name: postgres
    static_configs:
      - targets:
          - postgres:5432

  - job_name: redis
    static_configs:
      - targets:
          - redis:6379

  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets:
          - rabbitmq:15692
